name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Do not set registry-url here — changesets/action writes its own
      # .npmrc from NPM_TOKEN. setup-node with registry-url but no
      # NODE_AUTH_TOKEN leaves a broken user-level .npmrc that causes
      # npm publish to fail with a misleading E404 on scoped packages.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx turbo run build

      - name: Verify npm publish credentials
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is empty. Add an npm Automation token for the @heybray scope."
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          npm whoami
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # On a push to main with pending changesets, this opens/updates a
      # "Version Packages" PR. On a push to main where that PR was just
      # merged (i.e. no pending changesets, versions already bumped), it
      # publishes every changed package to npm instead.
      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # changesets/action checks for NPM_TOKEN literally — not NODE_AUTH_TOKEN.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "false"
